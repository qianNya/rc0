name: rc0_unity_widget
description: RC0 Unity 3D runtime embed — PlatformView + command/event bridge for iOS, Android, macOS, Windows, and WebGL.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rc0.unity
        pluginClass: Rc0UnityWidgetPlugin
      ios:
        pluginClass: Rc0UnityWidgetPlugin
      macos:
        pluginClass: Rc0UnityWidgetPlugin
      windows:
        pluginClass: Rc0UnityWidgetPluginCApi
      web:
        pluginClass: Rc0UnityWidgetWeb
        fileName: rc0_unity_widget_web.dart
